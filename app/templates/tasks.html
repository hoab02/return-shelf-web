{% extends "base.html" %}

{% block content %}
<section class="page-actions">
    <a class="btn btn-secondary" href="/scenarios?type={{ scenario.type if scenario else 'REPLENISHMENT' }}">
        ← Back to Scenario List
    </a>
</section>

<div id="scenario-summary-container">
    {% include "partials/scenario_summary.html" %}
</div>

<div id="tasks-table-container">
    {% include "partials/tasks_table.html" %}
</div>

<script>
(function () {
    const scenarioId = "{{ scenario.scenario_id if scenario else '' }}";
    const refreshIntervalMs = {{ refresh_interval_ms | default(4000) }};
    const summaryContainer = document.getElementById("scenario-summary-container");
    const tasksContainer = document.getElementById("tasks-table-container");

    if (!scenarioId) return;

    async function refreshScenarioSummary() {
        try {
            const response = await fetch(`/partials/scenarios/${encodeURIComponent(scenarioId)}/summary`, {
                headers: { "X-Requested-With": "fetch" },
                cache: "no-store"
            });

            if (!response.ok) return;

            const html = await response.text();
            summaryContainer.innerHTML = html;
        } catch (error) {
            console.error("Failed to refresh scenario summary:", error);
        }
    }

    async function refreshTasksTable() {
        try {
            const response = await fetch(`/partials/scenarios/${encodeURIComponent(scenarioId)}/tasks-table`, {
                headers: { "X-Requested-With": "fetch" },
                cache: "no-store"
            });

            if (!response.ok) return;

            const html = await response.text();
            tasksContainer.innerHTML = html;
        } catch (error) {
            console.error("Failed to refresh tasks table:", error);
        }
    }

    async function refreshAll() {
        await Promise.all([refreshScenarioSummary(), refreshTasksTable()]);
    }

    setInterval(refreshAll, refreshIntervalMs);
})();
</script>
{% endblock %}
